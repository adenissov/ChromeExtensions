<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <h1>Verint Role Export/Import</h1>

    <section id="modeStep">
      <div class="col">
        <button id="exportBtn">Export</button>
        <button id="importBtn">Import</button>
      </div>
    </section>

    <section id="uploadStep" class="hidden">
      <p id="uploadHint">Pick the role config CSV in the file dialog.</p>
      <input type="file" id="file" accept=".csv,text/csv" hidden />
    </section>

    <section id="exportStep" class="hidden">
      <label for="exportRole">Role to export</label>
      <select id="exportRole"></select>
      <div class="row">
        <button id="exportConfirmBtn">Export</button>
        <button id="exportCancelBtn" class="ghost">Cancel</button>
      </div>
    </section>

    <section id="report" class="hidden"></section>

    <section id="exportPrompt" class="hidden">Export: Select download destination</section>

    <section id="pickStep" class="hidden">
      <label for="role">Role name in role config *.CSV</label>
      <select id="role"></select>
      <label for="targetName" class="opt">Name of the role to create</label>
      <input type="text" id="targetName" />
      <div id="targetNameErr" class="err hidden"></div>
      <div class="row">
        <button id="continueBtn">Continue</button>
        <button id="cancelBtn" class="ghost">Cancel</button>
      </div>
    </section>

    <section id="confirm" class="hidden">
      <p id="confirmMsg"></p>
      <div class="row">
        <button id="yesBtn">Yes</button>
        <button id="noBtn" class="ghost">No</button>
      </div>
    </section>

    <section id="status" class="hidden"></section>

    <section id="outcomeStep" class="hidden">
      <p id="outcomeMsg"></p>
      <button id="outcomeOkBtn">OK</button>
    </section>

    <script src="../lib/protocol.js"></script>
    <script src="../lib/csv.js"></script>
    <script src="../lib/privileges.js"></script>
    <script src="../lib/validate.js"></script>
    <script src="../lib/csv-export.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
